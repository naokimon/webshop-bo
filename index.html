<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Velvet Room</title>
    <link rel="shortcut icon" href="img/velvet-room-icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">

<body>
    <header class="hero" id="home">
        <div class="title">
            <h1>
                The Velvet Room
            </h1>
            <p>
                What will you do?
            </p>
        </div>

        <nav class="title-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#persona-page">Persona's</a></li>
                <li><a href="#weapons-page">Weapons</a></li>
                <li><a href="pages/attendants.html">Attendants</a></li>
                <li><a href="#">Find us</a></li>
                <li><a href="pages/shoppingcart.html">
                        <div class="shopping-cart"></div>
                    </a></li>
            </ul>
        </nav>
    </header>

    <main class="main-page">
        <div class="site-name">
            <img src="img/velvet-room-icon.png" alt="">
            <span>
                The Velvet Room
            </span>
            <p>
                "Welcome to the Velvet Room. This place exists between dream and reality, mind and matter."
            </p>
        </div>
        <button onclick="scrollToSection('#persona-page')">
            Continue..?
        </button>
    </main>

    <div class="sort-bar">
        <label>Sort by:</label>
        <select id="sort-select" onchange="renderPersonas()">
            <option value="default">Default</option>
            <option value="name-asc">Name A-Z</option>
            <option value="name-desc">Name Z-A</option>
            <option value="price-asc">Price Low-High</option>
            <option value="price-desc">Price High-Low</option>
            <option value="arcana">Arcana</option>
        </select>
    </div>
    <main class="persona-page" id="persona-page">

    </main>

    <footer class="footer">
        <p>
            Made by <a href="https://github.com/naokimon" target="_blank">&#169;Naokimon</a>
        </p>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/personas.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/index.js"></script>
    <script>
        document.querySelectorAll(".add-to-cart-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                addToCart(btn.dataset.id, btn);
            });
        });
    </script>
</body>

</html>

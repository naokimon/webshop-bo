<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Velvet Room - Shopping Cart</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="shortcut icon" href="../img/velvet-room-icon.ico" type="image/x-icon">
</head>

<body>
    <header class="hero">
        <div class="title">
            <h1>The Velvet Room</h1>
            <p>What will you do?</p>
        </div>
        <nav class="title-nav">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../index.html#persona-page">Persona's</a></li>
                <li><a href="../index.html#weapons-page">Weapons</a></li>
                <li><a href="attendants.html">Attendants</a></li>
                <li><a href="secret.html">Find us</a></li>
            </ul>
        </nav>
    </header>

    <main class="cart-page">
        <header class="cart-title">
            <span>
                Your cart
            </span>
        </header>
        <section class="cart-info" id="cart-items">
        </section>
    </main>

    <div class="cart-total">
        <div class="total-price">
            <span>Total: </span>
            <span id="cart-total-price">¥0</span>
        </div>
        <button class="checkout-btn" id="checkout-btn" onclick="checkout()">Checkout..?</button>
    </div>

    <div id="checkout-modal" class="modal-overlay">
        <div class="modal-box">
            <h2>Purchase Complete</h2>
            <p id="modal-message"></p>
            <button onclick="closeModal()">Return to shop..?</button>
        </div>
    </div>

    <script src="../js/personas.js"></script>
    <script src="../js/weapons.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/cart-page.js"></script>
</body>

</html>
